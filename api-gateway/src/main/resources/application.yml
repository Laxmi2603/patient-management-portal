server:
    port: 4004

spring:
    cloud:
        gateway:
            server:
                webflux:
                    routes:
                        ## REST-CLIENT: http://localhost:4004/api/patients
                        ## API-GATEWAY: http://patient-service-app:4000/patients
                        - id: patienet-service-route
                          uri: http://patient-service-app:4000
                          predicates:
                            - Path=/api/patients/**
                          filters:
                            - StripPrefix=1
                            - JwtValidation
                        
                        - id: api-docs-patienet-route
                          uri: http://patient-service-app:4000
                          predicates:
                            - Path=/api-docs/patients
                          filters:
                            - RewritePath=/api-docs/patients,/v3/api-docs

                        - id: auth-service-route
                          uri: http://auth-service-app:4005
                          predicates:
                            - Path=/auth/**
                          filters:
                            - StripPrefix=1

                        - id: api-docs-auth-route
                          uri: http://auth-service-app:4005
                          predicates:
                            - Path=/api-docs/auth
                          filters:
                            - RewritePath=/api-docs/auth,/v3/api-docs