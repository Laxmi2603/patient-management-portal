services:
  patient-db:
    image: postgres:16-alpine
    container_name: patient-service-db
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5000:5432"
    networks:
      - patient-net
    volumes:
      - patient_db_data:/var/lib/postgresql/data

  auth-service-db:
    image: postgres:16-alpine
    container_name: auth-service-db
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5001:5432"
    networks:
      - patient-net
    volumes:
      - patient_db_data:/var/lib/postgresql/data

  patient-service:
    build: ./patient-service
    container_name: patient-service-app
    depends_on:
      - patient-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-service-db:5432/patient_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9001
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - patient-net

  billing-service:
    build: ./billing-service
    container_name: billing-service-app
    ports:
      - "4001:4001"
      - "9001:9001"
    networks:
      - patient-net

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service-app
    ports:
      - "4002:4002"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - patient-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - patient-service
    environment:
      AUTH_SERVICE_URL: http://auth-service-app:4005
    ports:
      - "4004:4004"
    networks:
      - patient-net

  auth-service:
    build: ./auth-service
    container_name: auth-service-app
    depends_on:
      - auth-service-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-service-db:5432/patient_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: W5dXIipAdljB6mGtLBJCVo1ekgkLaqBBT4NlK4kHuSi
    networks:
      - patient-net
  
  kafka:
    image: apache/kafka:latest
    container_name: kafka-service
    ports: 
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://:9094
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@127.0.0.1:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    networks:
      - patient-net

networks:
  patient-net:
    driver: bridge

volumes:
  patient_db_data: